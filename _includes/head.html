{% assign page_title = page.title | default: site.title %}
{% assign page_desc = page.description | default: site.description %}
{% assign page_image = page.image | default: '/static/images/main_figure.png' | absolute_url %}
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ page_title }}</title>
<meta name="description" content="{{ page_desc }}">
<link rel="canonical" href="{{ page.url | absolute_url }}">

<!-- Open Graph -->
<meta property="og:title" content="{{ page_title }}"/>
<meta property="og:description" content="{{ page_desc }}"/>
<meta property="og:type" content="website"/>
<meta property="og:url" content="{{ page.url | absolute_url }}"/>
<meta property="og:image" content="{{ page_image }}"/>
<meta property="og:site_name" content="{{ site.title }}"/>

<!-- Twitter -->
<meta name="twitter:card" content="summary_large_image"/>
<meta name="twitter:title" content="{{ page_title }}"/>
<meta name="twitter:description" content="{{ page_desc }}"/>
<meta name="twitter:image" content="{{ page_image }}"/>

<!-- Structured data -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "ScholarlyArticle",
  "headline": {{ page_title | jsonify }},
  "description": {{ page_desc | jsonify }},
  "image": {{ page_image | jsonify }},
  "url": {{ page.url | absolute_url | jsonify }},
  "author": [
    {% for a in page.authors %}{ "@type": "Person", "name": {{ a.name | jsonify }} }{% unless forloop.last %},{% endunless %}{% endfor %}
  ]
}
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Noto+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/academicons@1.9.1/css/academicons.min.css">
<link rel="stylesheet" href="{{ '/static/css/index.css' | relative_url }}">

<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌍</text></svg>">
