<!DOCTYPE html>
<html lang="en">
<head>
  {% include head.html %}
</head>
<body>

{{ content }}

<footer class="footer">
  <div class="container">
    <div class="columns is-centered">
      <div class="column is-8">
        <div class="content has-text-centered">
          <p>
            Page layout adapted from
            <a href="https://github.com/nerfies/nerfies.github.io">Nerfies</a>
            (also used by <a href="https://dino-wm.github.io/">DINO-WM</a>),
            licensed <a href="http://creativecommons.org/licenses/by-sa/4.0/">CC BY-SA 4.0</a>.
          </p>
        </div>
      </div>
    </div>
  </div>
</footer>

<!-- MathJax: renders the \(...\) and \[...\] that kramdown emits from $...$ / $$...$$ -->
<script type="text/x-mathjax-config">
  MathJax.Hub.Config({
    tex2jax: { inlineMath: [['$','$'], ['\\(','\\)']] },
    "HTML-CSS": { scale: 95 }
  });
</script>
<script async src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/MathJax.js?config=TeX-AMS_CHTML"></script>

<script>
  // Randomize the order of equal-contribution authors on each page load.
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('.equal-group').forEach(function (group) {
      var authors = Array.prototype.slice.call(group.querySelectorAll('.author-block'));
      if (authors.length < 2) return;
      for (var i = authors.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = authors[i]; authors[i] = authors[j]; authors[j] = tmp;
      }
      group.innerHTML = '';
      authors.forEach(function (el, idx) {
        if (idx > 0) group.appendChild(document.createTextNode(', '));
        group.appendChild(el);
      });
    });
  });
</script>

</body>
</html>
